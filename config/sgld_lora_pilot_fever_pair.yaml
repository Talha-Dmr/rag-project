# Pilot config for FEVER-style pair-NLI hallucination detection training.
#
# Expected raw FEVER data:
# - local JSON/JSONL files under data/fever/pair_nli
# - each record should include:
#   - claim (or hypothesis)
#   - label: SUPPORTS / REFUTES / NOT ENOUGH INFO
#   - evidence_text (or premise/context/evidence) containing resolved evidence text
#
# Prepare training data:
#   PYTHONPATH=. venv312/bin/python scripts/prepare_training_data.py \
#     --config config/sgld_lora_pilot_fever_pair.yaml \
#     --output-dir data/training/nli_dataset_fever_pair
#
# Train:
#   PYTHONPATH=. venv312/bin/python scripts/train_hallucination_model.py \
#     --config config/sgld_lora_pilot_fever_pair.yaml \
#     --data-dir data/training/nli_dataset_fever_pair \
#     --output-dir models/checkpoints/sgld_lora_pilot_fever_pair

training:
  model:
    base_model: microsoft/deberta-v3-small
    num_labels: 3
    cache_dir: ./models/training
    lora:
      enabled: true
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      bias: none
      task_type: SEQ_CLS
      target_modules: ["query_proj", "key_proj", "value_proj"]
      modules_to_save: ["classifier", "pooler"]

  hyperparameters:
    learning_rate: 2.0e-5
    weight_decay: 0.01
    warmup_steps: 0
    max_epochs: 2
    batch_size: 16
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0
    mixed_precision: fp16
    optimizer: sgld
    noise_scale: 0.01
    scheduler: linear

  data:
    max_seq_length: 128
    train_split: 0.85
    val_split: 0.10
    test_split: 0.05
    balance_classes: true
    balance_strategy: undersample

  checkpointing:
    save_dir: ./models/checkpoints/sgld_lora_pilot_fever_pair
    save_strategy: best
    save_every_n_epochs: 1
    save_total_limit: 2
    metric_for_best: f1_macro
    mode: max

  early_stopping:
    enabled: true
    patience: 1
    metric: f1_macro
    mode: max
    min_delta: 0.0001

  datasets:
    fever:
      path: data/fever/pair_nli
      weight: 1.0
      multiplier: 1

  output:
    training_data_dir: ./data/training/nli_dataset_fever_pair
    checkpoint_dir: ./models/checkpoints/sgld_lora_pilot_fever_pair
    final_model_dir: ./models/hallucination_detector_sgld_lora_pilot_fever_pair
    logs_dir: ./logs/training
