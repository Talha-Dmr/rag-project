# Financial regulation/compliance domain: cross-encoder reranker A/B run.

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cuda

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg
    collection_name: rag_finreg

llm:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  device: cuda
  max_tokens: 256

chunking:
  strategy: semantic
  config:
    similarity_threshold: 0.7
    min_chunk_size: 100
    max_chunk_size: 1000
    embedder:
      type: huggingface
      model_name: sentence-transformers/all-mpnet-base-v2
      device: cuda
      cache_folder: ./models/embeddings
      batch_size: 32

retrieval:
  k: 12
  score_threshold: 0.0

reranker:
  type: cross_encoder
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5
  device: cuda

hallucination_detector:
  model_path: electra_deberta/final_fever_deberta_v3_base_model
  base_model: microsoft/deberta-v3-base
  mc_dropout_samples: 1
  logit_sampling:
    enabled: true
    steps: 40
    step_size: 0.03
    noise_std: 0.1
    energy: hybrid
    prior_strength: 1.0
    entropy_weight: 0.5

sources:
  consistency_top_k: 5
  balance_named_families: true
  balance_min_named_families: 2

gating:
  enabled: true
  strategy: retrieve_more
  max_retries: 2
  k_multiplier: 2.0
  max_k: 20
  contradiction_rate_threshold: 1.01
  contradiction_prob_threshold: 0.54
  uncertainty_source: logit_mi
  uncertainty_threshold: 0.02
  source_consistency_threshold: 0.35
  source_consistency_top_k: 5
  abstain_message: "I don't have enough reliable information to answer that."
