# Warm-start config for LoRA + SGLD (noise=5e-5) with focal loss + neutral-collapse guard.
# Key differences vs prior focal run:
# - balanced sampler enabled (reduces collapse under shuffle)
# - neutral margin regularization enabled (explicit neutral preservation)
#
# Use with:
# PYTHONPATH=. venv312/bin/python scripts/train_hallucination_model.py \
#   --config sgld_lora_warmstart_ambigqa_mini_noise5e-5_focalguard_balanced \
#   --data-dir data/training/nli_dataset_ambigqa_mini \
#   --output-dir models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_focalguard_balanced \
#   --resume-from models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5/checkpoint-step-5000

training:
  model:
    base_model: microsoft/deberta-v3-small
    num_labels: 3
    cache_dir: ./models/training
    lora:
      enabled: true
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      bias: none
      task_type: SEQ_CLS
      target_modules: ["query_proj", "key_proj", "value_proj"]
      modules_to_save: ["classifier", "pooler"]

  hyperparameters:
    learning_rate: 1.0e-5
    weight_decay: 0.01
    warmup_steps: 0
    # NOTE: When resuming from a checkpoint whose state has epoch>=1 (e.g. checkpoint-step-5000),
    # max_epochs must be > epoch to actually run training. With max_epochs=2, a checkpoint at
    # epoch=1 will run exactly one epoch (epoch index 1).
    max_epochs: 2
    batch_size: 16
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0
    mixed_precision: fp16
    optimizer: sgld
    noise_scale: 5.0e-5
    scheduler: linear
    loss:
      type: focal
      gamma: 2.0
      label_smoothing: 0.02
      neutral_boost_weight: 0.15
      neutral_margin: 0.10

  data:
    max_seq_length: 128
    train_split: 0.85
    val_split: 0.10
    test_split: 0.05
    balance_classes: true
    balance_strategy: undersample
    train_sampling_strategy: balanced
    train_sampling_power: 1.0

  checkpointing:
    save_dir: ./models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_focalguard_balanced
    save_strategy: best
    save_every_n_epochs: 1
    save_total_limit: 2
    metric_for_best: f1_macro
    mode: max

  early_stopping:
    enabled: true
    patience: 1
    metric: f1_macro
    mode: max
    min_delta: 0.0001

  datasets:
    ambigqa:
      path: data/ambiguity_datasets/02_ambigqa
      weight: 1.0
      multiplier: 3

  output:
    training_data_dir: ./data/training/nli_dataset_ambigqa_mini
    checkpoint_dir: ./models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_focalguard_balanced
    final_model_dir: ./models/hallucination_detector_sgld_lora_warmstart_ambigqa_mini_noise5e-5_focalguard_balanced
    logs_dir: ./logs/training
