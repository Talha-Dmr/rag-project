# Final report baseline: retrieval, reranking, generation, and answer quality.
# Detector and gating are disabled so this isolates the RAG pipeline.

data_loader:
  default_loader: json
  json:
    content_field: content

chunking:
  strategy: section_aware
  config:
    max_chunk_size: 1200
    min_chunk_size: 250
    chunk_overlap: 120
    max_heading_length: 120
    allow_titlecase_headings: true

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cuda
  cache_folder: ./models/embeddings
  batch_size: 32

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg_real_section
    collection_name: rag_finreg_real_section

llm:
  model_name: Qwen/Qwen2.5-3B-Instruct
  device: cuda
  cache_folder: ./models/llm
  dtype: float16
  max_tokens: 300
  max_prompt_tokens: 6000
  truncation_side: right
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.05
  no_repeat_ngram_size: 4
  use_chat_template: true
  low_cpu_mem_usage: true
  attn_implementation: eager
  use_cache: true
  clear_cuda_cache_after_generate: true

retrieval:
  k: 16
  score_threshold: 0.0
  query_expansion:
    enabled: true
    max_queries: 3
    per_query_k: 12
    max_candidates: 24
    merge_strategy: round_robin
    fallback_terms: "governance controls responsibilities monitoring testing evidence limits avoid overclaiming"

reranker:
  type: cross_encoder
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cuda
  top_k: 12

hallucination_detector:
  enabled: false

answer_quality:
  enabled: true
  min_concept_coverage: 0.55
  min_context_coverage: 0.45
  allow_context_concept_expansion: true
  context_expansion_min_query_concepts: 3
  rewrite_on_low_coverage: true
  max_rewrites: 1
  rewrite_max_tokens: 300
  accept_rewrite_only_if_not_worse: true
  max_required_concepts: 8
  max_feedback_concepts: 6
  claim_level: false
  max_claims: 5

gating:
  enabled: false
  abstain_message: "I don't have enough reliable evidence to support that answer."

sources:
  max_sources: 6
  include_scores: true
  balance_named_families: true
  balance_min_named_families: 2
  exact_citation_resolver_enabled: true
  exact_citation_max_per_citation: 1
  citation_data_dir: data/processed/finreg
