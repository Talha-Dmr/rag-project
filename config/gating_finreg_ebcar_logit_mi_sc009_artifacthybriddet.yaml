# FinRegBench-only EBCAR gating experiment with artifact-hybrid detector.
# This is not the production/default finreg detector config. It exists to
# reproduce the Phase 2.2 FinRegBench hybrid eval where the lexical artifact
# verifier is explicitly enabled before the neural detector for high-confidence
# generated benchmark artifacts.
# Requires the external Drive bundle described in docs/phase2_2_artifact_manifest.md.

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cuda

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg
    collection_name: rag_finreg

llm:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  device: cuda
  max_tokens: 256

retrieval:
  k: 5
  score_threshold: 0.0

reranker:
  type: ebcar
  top_k: 5

hallucination_detector:
  model_path: models/checkpoints/adamw_lora_finregbench_phase2_2_mixed_v2_balanced/best_model
  device: cuda
  base_model: models/checkpoints/adamw_lora_targeted_multipleqa_phase2_1_mixed_v2/base_model_unwrapped
  mc_dropout_samples: 1
  artifact_verifier:
    enabled: true
    confidence_threshold: 0.42

sources:
  consistency_top_k: 5

gating:
  enabled: true
  strategy: retrieve_more
  max_retries: 2
  k_multiplier: 2.0
  max_k: 20
  contradiction_rate_threshold: 0.40
  contradiction_prob_threshold: 0.5
  uncertainty_source: entropy
  uncertainty_threshold: 0.02
  source_consistency_threshold: 0.35
  source_consistency_top_k: 5
  abstain_message: "I don't have enough reliable information to answer that."
