# Full FinReg RAG config with section-aware retrieval, cross-encoder reranking,
# V3 hardmix detector, and answer-quality rewrite/audit.

data_loader:
  default_loader: json
  json:
    content_field: content

chunking:
  strategy: section_aware
  config:
    max_chunk_size: 1200
    min_chunk_size: 250
    chunk_overlap: 120
    max_heading_length: 120
    allow_titlecase_headings: true

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  # Keep retrieval support models on CPU for long benchmark stability; Qwen remains
  # on CUDA, while detector/reranker/embedder avoid competing CUDA kernels.
  device: cpu
  cache_folder: ./models/embeddings
  batch_size: 32

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg_real_section
    collection_name: rag_finreg_real_section

llm:
  model_name: Qwen/Qwen2.5-3B-Instruct
  device: cuda
  cache_folder: ./models/llm
  max_tokens: 192
  max_prompt_tokens: 3072
  temperature: 0.0
  top_p: 0.9
  load_in_8bit: false
  use_chat_template: true
  attn_implementation: eager
  use_cache: false
  clear_cuda_cache_after_generate: true

retrieval:
  k: 24
  score_threshold: 0.0
  query_expansion:
    enabled: true
    max_queries: 3
    per_query_k: 24
    max_candidates: 48
    fallback_terms: "governance controls monitoring evidence limitations"

reranker:
  type: cross_encoder
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cpu
  top_k: 10

hallucination_detector:
  enabled: true
  model_path: models/checkpoints/finregbench_modernbert_detector_v3_hardmix/best_model
  base_model: tasksource/ModernBERT-base-nli
  # Keep the detector on CPU in this integration config. On the RTX 3090 test
  # machine, running Qwen generation and ModernBERT detection in the same CUDA
  # process intermittently corrupted the CUDA context during multi-question runs.
  device: cpu
  max_length: 1024
  batch_size: 4
  hypothesis_format: question_and_candidate_answer
  risk_mode: answer_include
  aggregation: answer_include_best
  answer_include_threshold: 0.97

hallucination_aggregation: answer_include_best

answer_quality:
  enabled: true
  min_concept_coverage: 0.45
  min_context_coverage: 0.45
  allow_context_concept_expansion: true
  context_expansion_min_query_concepts: 3
  rewrite_on_low_coverage: true
  max_rewrites: 1
  rewrite_max_tokens: 220
  max_required_concepts: 7
  max_feedback_concepts: 5
  # Claim-level checking is implemented but kept off by default because repeated
  # ModernBERT calls caused CUDA instability on the RTX 3090 test machine.
  claim_level: false
  max_claims: 5
  claim_aggregation: answer_include_best
  min_claim_include_rate: 0.75
  max_claim_answer_include_risk: 0.97

gating:
  enabled: true
  strategy: abstain
  contradiction_prob_metric: answer_include_risk
  contradiction_prob_threshold: 0.97
  contradiction_rate_metric: hard_contradiction_rate
  contradiction_rate_threshold: 0.40
  uncertainty_threshold: 1.0
  min_answer_completeness_score: 0.40
  min_context_coverage: 0.40
  abstain_message: "I don't have enough reliable evidence to support that answer."

sources:
  max_sources: 8
  include_scores: true
