# Warm-start config for LoRA + SGLD (noise=5e-5) with contradiction guard focused on
# the hardest contradiction subset: multipleQAs fabricated examples.
#
# Use with:
# PYTHONPATH=. venv312/bin/python scripts/train_hallucination_model.py \
#   --config sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard_v3 \
#   --data-dir data/training/nli_dataset_ambigqa_mini \
#   --output-dir models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard_v3 \
#   --resume-from models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard/checkpoint-step-4000

training:
  model:
    base_model: microsoft/deberta-v3-small
    num_labels: 3
    cache_dir: ./models/training
    lora:
      enabled: true
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      bias: none
      task_type: SEQ_CLS
      target_modules: ["query_proj", "key_proj", "value_proj"]
      modules_to_save: ["classifier", "pooler"]

  hyperparameters:
    learning_rate: 1.0e-5
    weight_decay: 0.01
    warmup_steps: 0
    max_epochs: 1
    batch_size: 16
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0
    mixed_precision: fp16
    optimizer: sgld
    noise_scale: 5.0e-5
    scheduler: linear
    loss:
      type: weighted_ce
      class_weights: [1.0, 1.0, 1.20]
      label_smoothing: 0.01
      contradiction_multiqa_boost_weight: 0.16
      contradiction_multiqa_margin: 0.08

  data:
    max_seq_length: 128
    train_split: 0.85
    val_split: 0.10
    test_split: 0.05
    balance_classes: true
    balance_strategy: undersample
    train_sampling_strategy: balanced
    train_sampling_power: 1.0

  checkpointing:
    save_dir: ./models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard_v3
    save_strategy: best
    save_every_n_epochs: 1
    save_total_limit: 2
    metric_for_best: f1_macro
    mode: max

  early_stopping:
    enabled: true
    patience: 1
    metric: f1_macro
    mode: max
    min_delta: 0.0001

  datasets:
    ambigqa:
      path: data/ambiguity_datasets/02_ambigqa
      weight: 1.0
      multiplier: 3

  output:
    training_data_dir: ./data/training/nli_dataset_ambigqa_mini
    checkpoint_dir: ./models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard_v3
    final_model_dir: ./models/hallucination_detector_sgld_lora_warmstart_ambigqa_mini_noise5e-5_contraguard_v3
    logs_dir: ./logs/training
