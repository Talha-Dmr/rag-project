# Financial regulation detector-only config for real-life unsupported-answer checks.

data_loader:
  type: json
  batch_size: 10

chunking:
  strategy: fixed_size
  config:
    chunk_size: 512
    chunk_overlap: 50

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cuda
  cache_folder: ./models/embeddings
  batch_size: 32

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg
    collection_name: rag_finreg

llm:
  type: none

retrieval:
  k: 5
  score_threshold: 0.0

hallucination_detector:
  enabled: true
  model_path: models/checkpoints/finregbench_modernbert_detector/best_model
  base_model: tasksource/ModernBERT-base-nli
  device: cuda
  max_length: 1024
  batch_size: 4
  hypothesis_format: question_and_candidate_answer
  risk_mode: unsupported
  aggregation: unsupported_best
  unsupported_threshold: 0.50

hallucination_aggregation: unsupported_best

gating:
  enabled: true
  strategy: abstain
  contradiction_prob_metric: unsupported_risk
  contradiction_prob_threshold: 0.50
  contradiction_rate_metric: hard_unsupported_rate
  contradiction_rate_threshold: 0.80
  uncertainty_threshold: 1.0
  abstain_message: "I don't have enough reliable evidence to support that answer."

sources:
  max_sources: 5
  include_scores: true
