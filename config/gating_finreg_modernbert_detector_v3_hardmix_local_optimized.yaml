# Local optimized detector-only FinReg config.
#
# Derived from gating_finreg_modernbert_detector_v3_hardmix_calibrated.yaml.
# The answer_include_threshold was tuned on the local controlled candidate
# benchmark after rebuilding data/vector_db/domain_finreg from the phase-1 corpus.

data_loader:
  type: json
  batch_size: 10

chunking:
  strategy: fixed_size
  config:
    chunk_size: 512
    chunk_overlap: 50

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cuda
  cache_folder: ./models/embeddings
  batch_size: 32

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg
    collection_name: rag_finreg

llm:
  type: none

retrieval:
  k: 5
  score_threshold: 0.0

hallucination_detector:
  enabled: true
  model_path: models/checkpoints/finregbench_modernbert_detector_v3_hardmix/best_model
  base_model: tasksource/ModernBERT-base-nli
  device: cuda
  max_length: 1024
  batch_size: 4
  hypothesis_format: question_and_candidate_answer
  risk_mode: answer_include
  aggregation: answer_include_best
  answer_include_threshold: 0.963

hallucination_aggregation: answer_include_best

gating:
  enabled: true
  strategy: abstain
  contradiction_prob_metric: answer_include_risk
  contradiction_prob_threshold: 0.963
  contradiction_rate_metric: hard_contradiction_rate
  contradiction_rate_threshold: 0.40
  uncertainty_threshold: 1.0
  abstain_message: "I don't have enough reliable evidence to support that answer."

sources:
  max_sources: 5
  include_scores: true
