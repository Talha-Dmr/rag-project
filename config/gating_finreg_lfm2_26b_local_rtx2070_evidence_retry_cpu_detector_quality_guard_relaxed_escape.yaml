# RTX 2070 fallback config for FullRAG80 with local LiquidAI LFM2 2.6B.
#
# This experimental variant starts from the answer-quality guard config and adds
# a second-stage high-quality escape hatch after exhausted retrieve_more. It is
# benchmark-independent and uses only runtime query, answer, retrieval, detector,
# and answer-quality signals.

embeddings:
  type: huggingface
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cpu
  cache_folder: ./models/embeddings
  local_files_only: true

vector_store:
  type: chroma
  config:
    persist_directory: ./data/vector_db/domain_finreg
    collection_name: rag_finreg

llm:
  model_name: models/manual/LFM2-2.6B
  device: cuda
  cache_folder: ./models/llm
  dtype: float16
  trust_remote_code: true
  attn_implementation: eager
  max_tokens: 128
  max_prompt_tokens: 1536
  truncation_side: left
  temperature: 0.0
  top_p: 1.0
  use_cache: true
  clear_cuda_cache_after_generate: true

retrieval:
  k: 5
  score_threshold: 0.0

reranker:
  type: ebcar
  top_k: 8
  embedder_config:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    device: cpu

hallucination_detector:
  model_path: models/checkpoints/sgld_lora_warmstart_ambigqa_mini_noise5e-5_balanced/best_model
  base_model: microsoft/deberta-v3-small
  device: cpu
  mc_dropout_samples: 1
  batch_size: 4
  logit_sampling:
    enabled: true
    device: cpu
    steps: 40
    step_size: 0.03
    noise_std: 0.1
    energy: hybrid
    prior_strength: 1.0
    entropy_weight: 0.5

sources:
  consistency_top_k: 5

answer_quality:
  enabled: true
  min_concept_coverage: 0.50
  min_context_coverage: 0.45
  allow_context_concept_expansion: true
  context_expansion_min_query_concepts: 3
  rewrite_on_low_coverage: true
  max_rewrites: 1
  rewrite_max_tokens: 160
  accept_rewrite_only_if_not_worse: false
  max_required_concepts: 7
  max_feedback_concepts: 5
  claim_level: false
  max_claims: 5
  min_claim_include_rate: 0.75
  max_claim_answer_include_risk: 0.97

gating:
  enabled: true
  strategy: retrieve_more
  max_retries: 1
  k_multiplier: 1.6
  max_k: 8
  contradiction_rate_threshold: 0.40
  contradiction_prob_threshold: 0.5
  uncertainty_source: logit_mi
  uncertainty_threshold: 0.02
  source_consistency_threshold: 0.35
  min_answer_completeness_score: 0.40
  min_context_coverage: 0.40
  source_consistency_top_k: 5
  abstain_message: "I don't have enough reliable information to answer that."
  evidence_sampling:
    enabled: true
    shadow_only: false
    policy: guarded_v3
    subset_size: 4
    num_subsets: 4
    seed: 7
    include_details: false
    exhausted_retrieve_more_action: answer_if_confident
    exhausted_min_retrieval_max: 0.62
    exhausted_min_retrieval_mean: 0.44
    exhausted_min_source_consistency: 0.55
    exhausted_min_answer_completeness_score: 0.40
    exhausted_min_context_coverage: 0.40
    exhausted_max_answer_include_risk: 0.68
    exhausted_max_combined_conflict: 0.34
    exhausted_max_contradiction_rate: 0.65
    exhausted_max_contradiction_prob: 0.36
    exhausted_relaxed_high_quality_enabled: true
    exhausted_relaxed_min_retrieval_max: 0.50
    exhausted_relaxed_min_retrieval_mean: 0.32
    exhausted_relaxed_min_source_consistency: 0.49
    exhausted_relaxed_min_answer_completeness_score: 0.70
    exhausted_relaxed_min_context_coverage: 0.70
    exhausted_relaxed_max_answer_include_risk: 0.68
    exhausted_relaxed_max_combined_conflict: 0.34
    exhausted_relaxed_max_contradiction_rate: 0.65
    exhausted_relaxed_max_contradiction_prob: 0.36
    guard_answer_by_retrieval: true
    answer_min_retrieval_max: 0.62
    answer_min_retrieval_mean: 0.44
    answer_min_source_consistency: 0.55
    answer_min_answer_completeness_score: 0.40
    answer_min_context_coverage: 0.40
    answer_max_subset_risk: 0.68
